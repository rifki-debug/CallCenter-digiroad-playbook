<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digiroad — Call Center SOP & Customer Service Dashboard</title>
<style>
  :root{
    --red:#C8102E; --red-dark:#9c0c23; --red-light:#fdecef;
    --dark:#1a1a1a; --grey:#595959; --grey-light:#f2f2f2; --border:#e2e2e2;
    --green:#1e8e5a; --amber:#b5750a; --blue:#1d5fb5;
    --radius:10px; --shadow:0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#f7f7f8;color:var(--dark);}
  a{color:inherit;}
  .app{display:flex;min-height:100vh;}

  /* Sidebar */
  .sidebar{width:270px;flex-shrink:0;background:var(--dark);color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
  .brand{padding:22px 20px 14px;border-bottom:1px solid rgba(255,255,255,.1);}
  .brand .logo{font-size:22px;font-weight:800;color:#fff;letter-spacing:.5px;}
  .brand .logo span{color:var(--red);}
  .brand .sub{font-size:11.5px;color:#b7b7b7;margin-top:4px;line-height:1.4;}
  .nav{padding:10px 10px 20px;flex:1;}
  .nav-group-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:#8a8a8a;margin:16px 10px 6px;font-weight:700;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13.5px;color:#d8d8d8;margin-bottom:2px;transition:.12s;}
  .nav-item:hover{background:rgba(255,255,255,.06);color:#fff;}
  .nav-item.active{background:var(--red);color:#fff;font-weight:600;}
  .nav-item .ic{width:18px;text-align:center;flex-shrink:0;font-size:14px;}
  .sidebar-foot{padding:14px 20px;border-top:1px solid rgba(255,255,255,.1);font-size:10.5px;color:#8a8a8a;line-height:1.5;}

  /* Main */
  .main{flex:1;min-width:0;}
  .topbar{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:16px;}
  .topbar h1{font-size:17px;margin:0;font-weight:700;flex-shrink:0;}
  .search-wrap{flex:1;max-width:440px;position:relative;margin-left:auto;}
  .search-wrap input{width:100%;padding:9px 14px 9px 34px;border:1px solid var(--border);border-radius:8px;font-size:13.5px;outline:none;background:var(--grey-light);}
  .search-wrap input:focus{border-color:var(--red);background:#fff;}
  .search-wrap .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--grey);font-size:13px;}
  .search-results{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);max-height:420px;overflow-y:auto;display:none;z-index:30;}
  .search-results.show{display:block;}
  .sr-item{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;}
  .sr-item:last-child{border-bottom:none;}
  .sr-item:hover{background:var(--red-light);}
  .sr-tag{display:inline-block;font-size:10px;font-weight:700;color:var(--red);text-transform:uppercase;margin-bottom:3px;}
  .sr-q{font-size:13px;font-weight:600;color:var(--dark);}
  .sr-a{font-size:12px;color:var(--grey);margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .sr-empty{padding:16px;font-size:13px;color:var(--grey);text-align:center;}

  .content{padding:26px 28px 60px;max-width:1180px;}
  .section{display:none;}
  .section.active{display:block;animation:fade .15s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

  h2.title{font-size:22px;margin:0 0 6px;font-weight:800;}
  p.desc{color:var(--grey);font-size:13.5px;margin:0 0 22px;max-width:820px;line-height:1.6;}
  h3.h{font-size:15.5px;font-weight:700;margin:26px 0 10px;padding-bottom:8px;border-bottom:2px solid var(--red);}
  h4.hs{font-size:13.5px;font-weight:700;margin:16px 0 8px;color:var(--dark);}

  /* Cards */
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;margin-bottom:10px;}
  .card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);}
  .card .k{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--grey);font-weight:700;margin-bottom:6px;}
  .card .v{font-size:22px;font-weight:800;color:var(--dark);}
  .card .v small{font-size:12px;font-weight:600;color:var(--grey);}
  .card .foot{font-size:11.5px;color:var(--green);margin-top:4px;font-weight:600;}
  .card.accent{border-left:4px solid var(--red);}

  .banner{background:linear-gradient(135deg,var(--red),#e0334f);color:#fff;border-radius:var(--radius);padding:20px 24px;margin-bottom:22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;}
  .banner .bt{font-size:17px;font-weight:800;margin-bottom:4px;}
  .banner .bd{font-size:13px;opacity:.95;max-width:600px;line-height:1.5;}
  .banner .bp{background:rgba(255,255,255,.18);border-radius:8px;padding:10px 16px;font-size:12.5px;font-weight:600;white-space:nowrap;}

  table{width:100%;border-collapse:collapse;background:#fff;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:6px;}
  th{background:var(--dark);color:#fff;text-align:left;padding:10px 14px;font-size:12px;text-transform:uppercase;letter-spacing:.03em;}
  td{padding:10px 14px;font-size:13px;border-top:1px solid var(--border);line-height:1.5;}
  tr:nth-child(even) td{background:var(--grey-light);}
  .table-wrap{overflow-x:auto;margin-bottom:18px;}

  ul.bl{margin:0 0 14px;padding-left:20px;}
  ul.bl li{margin-bottom:7px;font-size:13.5px;line-height:1.55;}
  ol.nl{margin:0 0 14px;padding-left:20px;}
  ol.nl li{margin-bottom:7px;font-size:13.5px;line-height:1.55;}
  p.body-text{font-size:13.5px;line-height:1.65;margin:0 0 12px;}

  .badge{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.03em;}
  .badge.b2c{background:#e7f3ff;color:var(--blue);}
  .badge.b2b{background:#fff3e0;color:var(--amber);}
  .badge.do{background:#e7f7ee;color:var(--green);}
  .badge.dont{background:var(--red-light);color:var(--red);}

  /* Template boxes */
  .tpl{background:var(--grey-light);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;position:relative;}
  .tpl .tpl-title{font-size:12.5px;font-weight:700;margin-bottom:8px;color:var(--dark);}
  .tpl .tpl-body{font-size:13px;line-height:1.7;white-space:pre-wrap;color:#333;font-family:Consolas,Menlo,monospace;}
  .copy-btn{position:absolute;top:12px;right:12px;background:#fff;border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11.5px;cursor:pointer;font-weight:600;color:var(--dark);}
  .copy-btn:hover{border-color:var(--red);color:var(--red);}
  .copy-btn.copied{background:var(--green);color:#fff;border-color:var(--green);}

  /* FAQ accordion */
  .faq-controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .chip{border:1px solid var(--border);background:#fff;padding:6px 13px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;color:var(--grey);}
  .chip.active{background:var(--dark);color:#fff;border-color:var(--dark);}
  .faq-item{background:#fff;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden;}
  .faq-q{padding:12px 16px;font-size:13.5px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .faq-q:hover{background:var(--grey-light);}
  .faq-q .arrow{transition:.15s;flex-shrink:0;color:var(--red);font-size:12px;}
  .faq-item.open .arrow{transform:rotate(180deg);}
  .faq-a{max-height:0;overflow:hidden;transition:max-height .18s ease;font-size:13px;color:#333;line-height:1.6;}
  .faq-item.open .faq-a{max-height:300px;}
  .faq-a-inner{padding:0 16px 14px;}
  .faq-count{font-size:12px;color:var(--grey);margin-bottom:12px;}

  /* Tabs (channel SOP) */
  .tabs{display:flex;gap:6px;border-bottom:2px solid var(--border);margin-bottom:18px;flex-wrap:wrap;}
  .tab-btn{padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;color:var(--grey);border-bottom:2px solid transparent;margin-bottom:-2px;}
  .tab-btn.active{color:var(--red);border-color:var(--red);}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}

  /* Flow steps */
  .flow{display:flex;flex-direction:column;align-items:center;margin:14px 0 22px;}
  .flow-step{background:#fff;border:1.5px solid var(--red);color:var(--dark);font-weight:700;font-size:13px;padding:10px 20px;border-radius:8px;text-align:center;box-shadow:var(--shadow);}
  .flow-arrow{color:var(--red);font-size:18px;line-height:1;margin:2px 0;}

  /* Decision tree */
  .dtree{background:#0f1115;color:#d7f5df;font-family:Consolas,Menlo,monospace;font-size:12.5px;line-height:1.55;border-radius:var(--radius);padding:20px 24px;overflow-x:auto;white-space:pre;margin-bottom:20px;}

  /* Scenario chat */
  .scenario-controls{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
  .scenario-controls select,.scenario-controls input{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;}
  .scenario-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:20px;}
  .scenario-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px 14px;cursor:pointer;font-size:12.5px;font-weight:600;box-shadow:var(--shadow);}
  .scenario-card:hover{border-color:var(--red);}
  .scenario-card .n{color:var(--red);font-weight:800;margin-right:4px;}
  .chatbox{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);margin-bottom:20px;}
  .chatbox h4{margin:0 0 14px;font-size:14.5px;}
  .bubble{max-width:78%;padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.5;margin-bottom:8px;}
  .bubble.customer{background:var(--grey-light);border-bottom-left-radius:2px;margin-right:auto;}
  .bubble.cs{background:var(--red);color:#fff;border-bottom-right-radius:2px;margin-left:auto;}
  .bubble .who{font-size:10px;font-weight:700;text-transform:uppercase;opacity:.7;margin-bottom:3px;}

  /* KPI gauges */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px;margin-bottom:10px;}
  .gauge-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);}
  .gauge-card .gk{font-size:12.5px;font-weight:700;margin-bottom:10px;}
  .bar-bg{background:var(--grey-light);border-radius:20px;height:10px;overflow:hidden;}
  .bar-fill{background:var(--red);height:100%;border-radius:20px;}
  .gauge-card .gt{font-size:11.5px;color:var(--grey);margin-top:8px;}

  .footnote{font-size:11.5px;color:var(--grey);font-style:italic;margin:6px 0 16px;}
  .pillbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .pillbar .pill{background:#fff;border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;}

  @media (max-width:880px){
    .sidebar{position:fixed;left:-280px;z-index:50;transition:.2s;}
    .sidebar.open{left:0;}
    .menu-btn{display:inline-flex!important;}
    .content{padding:18px 16px 60px;}
    .topbar{padding:12px 16px;}
  }
  .menu-btn{display:none;background:none;border:none;font-size:20px;cursor:pointer;color:var(--dark);}
</style>
</head>
<body>
<div class="app">

  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo">DIGI<span>ROAD</span></div>
      <div class="sub">Call Center SOP & Customer Service Dashboard<br>by Atlas Indonesia · v1.0</div>
    </div>
    <nav class="nav" id="navList"></nav>
    <div class="sidebar-foot">Dokumen internal — rahasia perusahaan. Dilarang menyebarluaskan tanpa izin manajemen.</div>
  </aside>

  <main class="main">
    <div class="topbar">
      <button class="menu-btn" id="menuBtn">☰</button>
      <h1 id="pageTitle">Overview</h1>
      <div class="search-wrap">
        <span class="si">🔍</span>
        <input type="text" id="searchInput" placeholder="Cari FAQ, harga, SOP, template...">
        <div class="search-results" id="searchResults"></div>
      </div>
    </div>
    <div class="content" id="content"></div>
  </main>

</div>

const CHANNELS = {

    ]
  },
  tiktok:{
    label:"TikTok DM",
    flow:["DM/Komentar Masuk","Greeting","Identifikasi Kebutuhan","Jawab Sesuai SOP (Poster jika soal harga)","CTA","Closing"],
    points:[
      ["CTA","Arahkan ke link di bio / aplikasi Digiroad; untuk detail/transaksi arahkan ke WhatsApp resmi."],
    ],

  callcenter:{
    label:"Call Center",

/* ============================= RENDER HELPERS ============================= */
function el(tag, attrs, html){
  const e = document.createElement(tag);
  if(attrs) for(const k in attrs) e.setAttribute(k, attrs[k]);
  if(html !== undefined) e.innerHTML = html;
  return e;
}
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function renderTable(headers, rows){
  let h = '<div class="table-wrap"><table><thead><tr>' + headers.map(x=>`<th>${x}</th>`).join('') + '</tr></thead><tbody>';
  rows.forEach(r => { h += '<tr>' + r.map(c=>`<td>${c}</td>`).join('') + '</tr>'; });
  h += '</tbody></table></div>';
  return h;
}
function renderTemplate(title, body){
  const id = 'tpl_' + Math.random().toString(36).slice(2,9);
  return `<div class="tpl">
    <button class="copy-btn" data-copy-target="${id}" onclick="copyTpl(this)">📋 Copy</button>
    <div class="tpl-title">${esc(title)}</div>
    <div class="tpl-body" id="${id}">${esc(body)}</div>
  </div>`;
}
function copyTpl(btn){
  const id = btn.getAttribute('data-copy-target');
  const text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent = "✔ Disalin"; btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent = "📋 Copy"; btn.classList.remove('copied'); }, 1500);
  });
}
function renderFlow(steps){
  let h = '<div class="flow">';
  steps.forEach((s,i)=>{
    h += `<div class="flow-step">${esc(s)}</div>`;
    if(i < steps.length-1) h += '<div class="flow-arrow">↓</div>';
  });
  h += '</div>';
  return h;
}

  ${DOS.map((d,i)=>`<tr><td>${esc(d)}</td><td>${esc(DONTS[i]||'')}</td></tr>`).join('')}
  </tbody></table></div>
  `;
}

function renderEscalation(){
  return `
  <h2 class="title">Escalation Matrix</h2>
  <p class="desc">Panduan eskalasi untuk kasus yang tidak dapat diselesaikan langsung oleh Frontliner.</p>
  ${renderTable(["Situasi","Trigger","Tindakan Frontliner","Eskalasi ke (PIC)"], ESCALATION)}
  `;
}

function renderKPI(){
  let h = `
  <h2 class="title">KPI Call Center & Customer Service</h2>
  <p class="desc">Target kualitas layanan sebagai acuan standar tim Call Center & Customer Service.</p>
  <div class="kpi-grid">
  `;
  KPI.forEach(([name,def,target,pct])=>{
    h += `<div class="gauge-card">
      <div class="gk">${esc(name)}</div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;"></div></div>
      <div class="gt"><b>Target:</b> ${esc(target)}</div>
      <div class="gt" style="margin-top:2px;">${esc(def)}</div>
    </div>`;
  });
  h += `</div><p class="footnote">Target dapat disesuaikan lebih lanjut oleh manajemen Call Center & Customer Service sesuai kebutuhan bisnis. Persentase bar bersifat ilustratif terhadap tingkat kepatuhan target.</p>`;
  return h;
}

/* ============================= SCENARIO GRID ============================= */
function renderScenarioGrid(){
  const filter = document.getElementById('scenarioFilter') ? document.getElementById('scenarioFilter').value : "Semua";
  const grid = document.getElementById('scenarioGrid');
  if(!grid) return;
  const list = SCENARIOS.filter(s => filter==="Semua" || s.tag===filter);
  grid.innerHTML = list.map((s)=>{
    const idx = SCENARIOS.indexOf(s);
    return `<div class="scenario-card" onclick="showScenario(${idx})"><span class="n">${idx+1}.</span>${esc(s.t)} <span class="badge ${s.tag==='B2B'?'b2b':'b2c'}" style="margin-left:6px;">${esc(s.tag)}</span></div>`;
  }).join('');
  const chatDiv = document.getElementById('scenarioChat');
  if(chatDiv) chatDiv.innerHTML = '';
}
function showScenario(idx){
  const s = SCENARIOS[idx];
  const chatDiv = document.getElementById('scenarioChat');
  chatDiv.innerHTML = `<div class="chatbox"><h4>${esc(idx+1)}. ${esc(s.t)} <span class="badge ${s.tag==='B2B'?'b2b':'b2c'}">${esc(s.tag)}</span></h4>
    ${s.lines.map(([who,text])=>`<div class="bubble ${who==='CS'?'cs':'customer'}"><div class="who">${who}</div>${esc(text)}</div>`).join('')}
  </div>`;
  if(chatDiv.scrollIntoView) chatDiv.scrollIntoView({behavior:'smooth', block:'nearest'});
}

/* ============================= NAV / ROUTER ============================= */
const SECTION_RENDER = {
  overview: renderOverview,
  campaign: renderCampaign,
  product: renderProduct,
  screening: renderScreening,
  channels: renderChannels,
  verification: renderVerification,
  faq: renderFAQPage,
  templates: renderTemplatesPage,
  donts: renderDonts,
  escalation: renderEscalation,
  kpi: renderKPI,
};
const TITLES = {
  overview:"Overview", campaign:"Campaign & Harga", product:"Product Knowledge", screening:"Customer Screening & Conversation Flow",
  channels:"SOP per Channel", verification:"Verifikasi & Poster Harga", faq:"FAQ", templates:"Template Jawaban Cepat",
  donts:"Do & Don't", escalation:"Escalation Matrix", kpi:"KPI Call Center & Customer Service"
};

function buildNav(){
  const navEl = document.getElementById('navList');
  navEl.innerHTML = '';
  NAV.forEach(group=>{
    const label = el('div',{class:'nav-group-label'}, group.group);
    navEl.appendChild(label);
    group.items.forEach(item=>{
      const it = el('div',{class:'nav-item', 'data-id':item.id}, `<span class="ic">${item.icon}</span><span>${item.label}</span>`);
      it.onclick = ()=> nav(item.id);
      navEl.appendChild(it);
    });
  });
}

function nav(id){
  document.querySelectorAll('.nav-item').forEach(n=> n.classList.toggle('active', n.dataset.id===id));
  document.getElementById('pageTitle').textContent = TITLES[id] || id;
  const content = document.getElementById('content');
  content.innerHTML = `<div class="section active">${SECTION_RENDER[id]()}</div>`;
  if(id==='faq'){ renderFAQBody(); }
  if(id==='screening'){ renderScenarioGrid(); }
  window.scrollTo(0,0);
  const sb = document.getElementById('sidebar');
  if(window.innerWidth <= 880) sb.classList.remove('open');
}

/* ============================= SEARCH ============================= */
function buildSearchIndex(){
  const idx = [];
  FAQ.forEach(f=> idx.push({tag:'FAQ · '+f.c, q:f.q, a:f.a, go:'faq'}));
  TEMPLATES.forEach(([t,b])=> idx.push({tag:'Template', q:t, a:b.replace(/\\n/g,' '), go:'templates'}));
  SCENARIOS.forEach(s=> idx.push({tag:'Skenario · '+s.tag, q:s.t, a:s.lines.map(l=>l[1]).join(' '), go:'screening'}));
  SERVICES.forEach(s=> idx.push({tag:'Product Knowledge', q:s.name, a:s.apa, go:'product'}));
  return idx;
}
let SEARCH_INDEX = [];
function doSearch(query){
  const box = document.getElementById('searchResults');
  if(!query || query.trim().length < 2){ box.classList.remove('show'); box.innerHTML=''; return; }
  const q = query.toLowerCase();
  const results = SEARCH_INDEX.filter(item => (item.q+' '+item.a).toLowerCase().includes(q)).slice(0,12);
  if(results.length===0){
    box.innerHTML = '<div class="sr-empty">Tidak ada hasil untuk "'+esc(query)+'"</div>';
  } else {
    box.innerHTML = results.map(r=>`<div class="sr-item" onclick="nav('${r.go}');document.getElementById('searchResults').classList.remove('show');document.getElementById('searchInput').value='';">
      <div class="sr-tag">${esc(r.tag)}</div>
      <div class="sr-q">${esc(r.q)}</div>
      <div class="sr-a">${esc(r.a)}</div>
    </div>`).join('');
  }
  box.classList.add('show');
}

/* ============================= INIT ============================= */
document.addEventListener('DOMContentLoaded', ()=>{
  buildNav();
  SEARCH_INDEX = buildSearchIndex();
  nav('overview');
  document.getElementById('searchInput').addEventListener('input', (e)=> doSearch(e.target.value));
  document.addEventListener('click', (e)=>{
    if(!e.target.closest('.search-wrap')) document.getElementById('searchResults').classList.remove('show');
  });
  document.getElementById('menuBtn').addEventListener('click', ()=> document.getElementById('sidebar').classList.toggle('open'));
});
</script>
</body>
